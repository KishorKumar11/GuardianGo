name: guardiago
description: Migrant worker rights super app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local DB
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ML Kit
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_translation: ^0.11.1
  google_mlkit_language_id: ^0.10.0

  # Encryption
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Biometric
  local_auth: ^2.3.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # TTS
  flutter_tts: ^4.0.2

  # Location
  geolocator: ^12.0.0

  # Network
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # i18n
  intl: any

  # Utils
  archive: ^3.6.1       # gzip for P2P backup

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ">=2.4.0 <2.4.2"
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
